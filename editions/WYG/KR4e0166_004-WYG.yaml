  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0166_WYG_004-1a, image: WYG1268/WYG1268-0757a.png}
body:
  text: 迪功集巻四明徐禎卿撰詠懷一十三首太宰召補職被疾不赴齋中作阮生嬰組緤陶子去東皋簡性輕物務牽役使心忉緬余沈中疚偃息悦蓬蒿嘉薦忝章句虛劣愧時髦雖釋負擔勤所患職司勞案牘殊停滯觚管間時操昨者銓衡召辭謝未云遭緜薄懼遺諐繩憲安可逃履貴常近辱執要思戒撓古人亦何求抱闗竊所饕申誡周任言寫心輸素毫将貽沮溺哂無為謝徂薅懷往二首昔我逢休景結交共雲翔秦客穆脩矩魯生蔚令章同聲展言笑四座發芬芳北牖湛清酒明月出西方廣署滅流塵蘭燈揚朱光極意連篇翰良夜殊未央歡宴豐時豫千秋焉可忘流光一朝絶撫膺増慨慷穴蟲測序改客鳥知時晏嚴風振中野凝霜薄飛觀褰裳啓東户河星出有燦耿耿不遑寐沈思汨回亂何以終遥夕明燈且濡翰自我違之子菀藻絶流玩郢斤不存目流俗恥堊墁塊處空堂中誰為發言粲感嘅申㣲詞佇立倚長嘆雜述緬求先民迹體德異通𤣥自非孔聃志所造孰無諐伊余實闇劣秉算昧㡬先言念恭人徳惴惴戒重淵徒隆守已樸罔達濟時權順正不尤物任道故樂天務光以潔湛梅生智自全箕子狂為奴何必屈父賢未周羣物情且復徇已偏人命㡬何時金石忽以遷永言保貞素庶明松栢堅眷念攜手益用嗣北風篇雨霽庭藥芬郁炎曦代暮節溽景布萋陰迎風抗高館䟽牖匝重林百卉熈嘉月洽土重豐霖中庭始及霽芳蕤忽以森即事寡喧垢投足類幽深朝藝植余杖時還散我襟處世常希寂委順故怡心何必東山下考築始投簮庚午歲九日始見二毛常年揺落不知悲九日今年感鬢絲緑醑滿眼竊自壽黄花插頭從帽敧孤心久寄風霜外生意長含日月私已息塵機甘退斥猶將筆硯愧支離歲除貽廷實太常子容同年歲寢物務寧時昏羣化伏勞人嘅寤歌旅者懷出宿倚徙窮陰沍屏居夜氣肅㳺星迴素郊嚴霜下庭木𤣥黰忽變節衰株遂臨復徂生苦鮮歡運往悲志促前軌修已侵後塗諒當卜嗟爾同行子及此荃蕙馥中秋夜不見月兼邀儲太僕不至今夜中秋月雲端空復情人間同寂寞天外獨分明桂子飄何處邉鴻度有聲他鄉對家醖愁絶為誰傾五月五日怡悦經故園芳菲值良節風俗猶自存念我久離别葵榴綴時穠蒲荷散幽洌莫謂暄景滋湘江坐鳴鴂對月有懷夜氣泛虛爽灘聲來自遲繫舟南斗下翫月西江湄對酒忽不御茫然空爾思調太學博士弱齡釋負擔浮沈游國都久知意不愜眷言返田區無為好爵縻衣錦享我芻顧非騂栗資何用辱鼎酺天羅汰迃散移署厠文儒攝齊升孔堂慚非由也徒藹藹青衿子鬱鬱含華珠上理羲皇文下則述唐虞暮春西水涯温藻穆敷愉童冠從我游詠歌聊以娛辟雝何崇崇崇崇䴡天樞周王亮有造賢者濟𢎞圖小子發斯謡聊與擊壌俱與太學諸僚宴集藝苑開三徑閒僚散竹林絃歌一以暇春服共相尋薄采漪皇澤臨風欵道襟高梧無雜蔓呦鹿有佳音藉草時傾酒披衣或鼓琴何妨慚㸃也吾醉獨狂吟題詠二十二首偶述二絶句聖人嘉禮在元年内使新從十道還欲遣鸞儀迎月姊禁中宣勑㑹金錢雙馬黄韉白玉羈蕃王遥貢立彤墀聖恩俄許歸天廏内使牽來不敢騎觀田魏二廷尉射歌魏子手挽高麗弓氣滿兩石開青虹田郎亦自號猛手談笑彎弓自裹肘秋風繫馬古原下合耦翩翩習步射眼中何有百步的彊幹慣使千年柘共驚二子手法利突如流星中如樹側身仰視秋雲開飛鳥顧之不敢度壯哉二子氣如虹左揮右霍真兩雄燕山秋高太白動寒日獵獵吹邊風前時出軍大同壘紅纓白馬多乳子柔絲斗弩不解持吹竽之濫誠可嗤彼乳子者何足道可惜王師直為老吁嗟田魏二子真雄才高壇大纛何有哉月故園今夜月迢逓向人明只自懸清漢那知隔鳳城氣兼風露發光逼曙烏驚何事江山外能催白髮生酬李員外贈古鏡歌闗西故人惜我别贈我古鏡光如雪感君意氣特相許爰披肝膽照清徹盪日摩空恍虛暎奥室青瞳閃宵晣妙質精凝水土深丹煙碧霧生華纈圜銘髣髴不可讀蚓屈蟲蠕細糾結腰間錦嚢故所佩請脱繩絲置扄鐍當令明月入我懷精光夜夜隨虹霓故人卓犖信才傑蒼鋩炯炯豈相劣嗟予蓬穢何所似對此不覺心内熱湘江溟洞入無滓衡嶽凌空鬱岑嶻山行應使魈魅逃水宿能令蛟怪滅古物由來孕神秀靈光不譲三尺鐵憐君至寶不自惜何以報之嗟菲蔑護藏但使鏡莫缺與君交情世不絶月落日桃源口迢迢望楚邦煙霏靜夜色棹響繞空江看月生西浦穿雲度北窗高樓有羈羽照影不成雙江夏題王守城南精舍林步不覺逺溪流隨興長悠然深竹裏獨往緑蘿莊山色佳南郭平疇連北堂野人來荷鋤蠶月百草芳寤愜白雲賞載謡叢桂章垂楊足池鯉閒牖有壺觴念此牽情性何勞緇素裳日蝕王春啓元祚陽德麗方升光華奄薄蝕陰厲故相乘精祲信交盪貞悔邈何徵千官祗對越聖席𦕈虚憑周詩舊陳戒麟編薄示懲昭象蓍龜合殷憂茲日承㣲臣限江漢延佇意何勝觀鴛鴦贈客網羅豈孤避志命願雙沈唯應合歡被為刺白頭吟女晬日去年生汝日吾病始人扶風俗傳針縷家貧亦履襦避寒猶在襁愛母未能呼女性從遲鈍無教勝丈夫觀唐生寄贈子容洞庭山圖因求作廬山障子丹巒氤氲拂空起素練平鋪洞庭水迴谿笑指毛公家忘却滄江㡬千里我隔廬峯夢紫煙嘗騎白鹿上青天煩君貌出仙人障西寄長安向日邊沅溪潘進士在長安逆旅中見庭下山丹花詰其主云是沅中移来感而賦詩命予嗣響故苑花空發他鄉鶯自啼主人孤館裏斜日楚雲西曹别駕畫山鷄歌東昌曹侯擅丹青天機觸手隨風雲戲貌山鷄􅘒出草錦毛霞翅回繽紛蹩距昻頭勢欲移似猜羅網立還遲家鷄突見甘一決對此凝然仍自疑題潘進士贈謝昌邑雪山圖誰謂咫尺勢宛如觀九疑狂風吹白雪片片落天池雲氣遶半壁煙光昏四維髣髴湘君廟如聞猿狖悲颯沓凌冬樹㸃綴有餘姿楚客善毫素游燕人未知北窗遇陶令大醉雪寒時凍灑丹青筆長歌歸去詞它日看圖畫難忘剡水思寄題瀘州韓道人霞外山居霞嶺新刋處由來古洞天仙人煉金液蜕此百餘年其事竟莫述丹書空秘𤣥忽有飛霞子誅茅卧紫烟虛府澂物滓靈根歸自然蒼龍守神室白虎伏階前逰心碧海外高詠閬風巔孤流振往𣲖絶理悟真詮余讀相如賦飄飄竊慕焉欲跨青牛去思飡金屑泉至道豈虛想銘心非薄縁瑶池應有㑹瓊笈願相傳題唐氏園池堂上琴書暇名園愜宴㳺緑陰交樹石白水散田疇林步常驚鳥沙眠且狎鷗開軒桑柘接當徑草花幽野老時相過村醪擬共酬陶然菊松下乗興足淹留鳳凰山園雜詠鳳鳴亭鳳鳥期不來瑶華㡬銷歇唯有山中人吹簫㺯明月月軒石室月已滿青林人未眠向月步溪水白雲遥在天香圃露華散平林月明在寥廓時有天風來泠然桂花落奕臺仙人好博奕時下緑雲中一片蒼苔石落花長自紅彩雲巖出巖初嫋嫋映日乍暉暉倏若陽臺女隨風化雨飛十六夜月乍滿虧俄及縁明晦易侵不愁妨玉兔常恐近浮陰白露丹楓急清光紫闥深如何鴻鴈意噭噭有驚音哀挽三首瞻文温州畫像浮生此世隔過位恍然疑直訝風雲動俄驚泰華隳巖廊不可起英爽儼如遺白首通羣略雄才沮一麾徒教涕泗闊共惜羽毛遲堂几蕭蕭在丹青漠漠垂典刑歸此老江海寄餘思有忝吹噓力無忘沃酹辭風煙久揺落魂氣復何之躑躅庭除下伸衷托短詩挽劉大夫瀚耆舊日云瘁斯人今則亡高門自喬木清望惜吾徒久厭揮金譽遥傳奉使圖勤勞中外洽醇介始終孚厯軄參廷尉紆金列大夫俄聞去秦隴早已憶江鱸自恥為名累非闗索杖扶角巾聊宴樂園徑忽榛蕪令子中朝貴青雲奮翼俱蒼茫㓙問逺浩蕩國恩殊紫璽加封舊黄金賜葬逾死生三品遇伉儷百年須走送連童穉飛旌出市衢夜臺渾寂寞霜雪正膏塗永與交親隔何言歲月徂野風吹客淚腸斷更踟蹰亡女旅櫬南泉寺月滿花宫不見人殤魂獨宿網流塵那因得借金輪力白玉光中現爾身迪功集巻四
