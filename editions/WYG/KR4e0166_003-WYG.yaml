body:
  text: 迪功集巻三明徐禎卿撰送别四十首送友二首𤓰生葛薪下縁蔓義相因人生交結故婉孌自諧親交義諒不逺戚若同株根勿采棘下𤓰棘傷多苦辛不惜傷者苦但恐株荄分念當與子别惻惻傷我神靡靡客行役曖曖歲云晏問子豈不勞言適故鄉縣送子不得逺我悲一以惋借問何所悲桑梓不可見褰裳陟高隴白日忽已暝飛鳥東西翔我思一以亂低頭念父母涕下忽如霰留别邊子我車駕言邁將子城之隅豈無他人親婘㜻心自知握手一為嘆忽忽從此辭驅車何迢迢迢迢復遲遲匪我車輪遲行子有所思登高望河水河水何瀰瀰褰裳欲涉之俛首以踟蹰孤楊生河干嫋嫋何差差民生失儔匹惻爾令心悲留别都城諸同志二首對酒忽不樂悵然懷别離别離結中勞眷彼長路岐苒苒郊河樹曖曖關門祠佇望瀟湘水先與秋風期鴻鴈雲中來噭噭使人悲懷哉爾方集悵矣予當辭客有悽悽者三年歌式㣲朅來事原隰經返舊園扉昔往被冬裘今還服春衣撫景雖云愜中歡憯以違出門見芳草念子忽如饑送邊子出刺衛輝五首平生歡愛日履坦昧前艱及爾嚴霜集方知末路難疇昔同棲翮毛羽各摧殘顧影惟爾我慽慽傷心肝心肝義所均離索一何深雖厯同朝寺雲路邈飛沈君處承明陽我居湖水隂淹闊嬰多痗日夕遲爾音爾音良不違胡為繫我思何况當乖絶飄颻各異枝欵曲杯酒言果諧符守期努力茂時猷聊以慰我私我私何悠悠薄送遵坰丘翔野曠無人樹木鳴颼颼登高望衛邑思見漕衛流前景奄忽匿浮雲蔽行輈行輈道已緜下車歲聿遷藹藹朝歌邑閭里翳人煙慷慨猗昔風緩疾在更絃寄謝當途子成朞庶來還送士選侍御壯士樂長征門前邊馬鳴春風三月栁吹暗大同城盧溝橋下東流水故人一樽情未己遥天飛盡隴頭雲唯見居庸暮山紫羨君鞍馬速流星予亦孤帆下洞庭塞北荆南心萬里佩刀長揖向都亭送范静之遷威州五首吾憐范巨卿悃愊不邀名作吏竹林下清風訟獄平與君同得罪獨􅇡夜郎城萬里巴江水相思猿狖鳴聞上巴江峽黄牛峽最遲君聽流水意何似隴頭悲爾向巫山日瞿塘春可憐栁絲嬌緑水白雪媚陽天玉壘為糟蘖巴川即酒泉乘舟捉明月直到女牛邊爾作南遷客余同北地囚酣歌易水動舞劍白虹流送徐生之金陵為慕金門來竊窺三年執㦸力云疲著書每憶東山好蘿月㝠㝠空紫芝吾宗羯子清狂甚笑拂扁舟向我辭清夜誰同牛渚泛早時聞詠女郎詩天外涼風吹不絶餘音長繞鳯凰池送許補之還丹徒憐君揮手去匹馬向南天旅病青山外鄉心落日懸燕關變積雪淮栁動新烟驛路重雲裏相思易隔年送王誕敷之官長沙美人南往雲陽墟我欲從之道鬱紆晝夢衡峯半空紫覺來失卻巴陵湖對君把酒心茫然七十二峯猶眼前𤣥猿攀蘿石壁仄黄鶴空洲芳草連春寒風多太陰黒瀟湘淋漓濕雲色楚宫花木啼杜鵑舟子商人淚横臆君欲去兮可奈何側知王事難蹉跎離心不惜瑶華贈聊為湘纍誦九歌送蕭若愚送君南下巴渝深予亦迢迢湘水心前路不知何地别千山萬壑暮猿吟送周夢良令臨朐官橋一壺酒來送穆陵人去住同為客風煙各損神征途殘臘盡到日栁條新要自酬知己寸心寧復陳送耿晦之守湖州逺下吳江向霅川高秋風物倍澄鮮鵁鶄菰葉翠相亂錦石㳺鱗清可憐郵渚撾頻津吏鼔漁歌唱近使君船吳興峴山足勝事漢水㐮陽空昔賢青門歌送吳郎吳郎醉嗜長安酒落魄自言為客久走馬頻看上苑花回鞭幾折青門栁青門曈曈魚鑰開乳燕㳺絲相逐來栁下雕鞍留别袂花間酒盞覆蒼苔浮雲去去辭城闕芳草連天那可歇野店春風聽早鶯關河曉樹懸新月干里淮流雙畫橈廣陵驛前逢暮潮落日帆歸揚子渡青山家對伯通橋吾家流水元非隔宛轉胥臺通巷陌草長難尋仲蔚居林深不見陶潛宅清溪屋下可垂綸復有蓴羮足獻親君歸倘食冰絲鱠為念覉棲塞北人贈别獻吉爾放金鷄别帝鄉何如李白在潯陽日暮經過燕趙客解裘同醉酒罏傍徘徊桂樹涼飈發仰視明河秋夜長此去梁園逢雨雪知予遥度赤城梁送友人還吳陽月隨陽鴈遥從塞上來北人江北望不見隴頭梅坐下楊朱淚吟為莊舄哀聊傳數行札千里送君回送蕭少府矯矯雙鳬塞隴分武夷殘雪半春雲玉洞只愁仙隱去洛陽花下不逢君送唐季和謫糓城襄陽千里道念爾一杯辭上馬山公醉瞢騰倒接䍦回風漂朔野飛雪繞征旗及此下車日黄河冰泮時江喧神女館花發峴山祠莫謂長沙謫風流良在兹送顧馬湖孔昭四首巴東明月巴西歌兩岸梅花羌笛多一曲停橈雙淚落猿聲三峽若為過西上江陵北客哀遥看巴路碧崔嵬樹繞黄牛瞿峽轉天横劎閣蜀門開錦水由來勝若耶蘭橈三月汎桃花巴兒見客能歌舞蜀女明妝笑浣紗成都酒樓高插天烏帽來游太白仙他日燕州何處覔星槎遥挂彩雲邊送廬陵楊二尹何卑執㦸謝京華却愛河陽縣裏花不為逺師招白社擬從勾令覔丹砂青天挂席浮明月螺水迴舟勝若耶莫學南昌隱君子離羣獨拂五雲車送友平原蒼蒼孟冬月行子辭燕指吳越淮水橋邊賣酒家停車㡬處梅花發羨爾侯門早拂衣柴桑舊里角巾歸白酒山中新芋熟青楓江上蟹螯肥閉門松竹依然在一曲參差醉落暉安南歌四首送沈使君借問炎交路若何片帆南指廣州過知君怕見桄榔樹近嶺猿聲日漸多漢關行盡忽桃源竹樹蕭蕭鷄狗喧銅鐶椎髻來迎榼蠻國王孫出領旙烏蠻灘上煙水聲伏波廟前秋月明夜半津人挽舟上夷歌偏動望鄉情皇穹覆載本無私聖主恩波詎有涯炎荒喜沐堯年雨黎人重拜漢官儀送方山人嚴子灘頭花落時水清雲碧净漣漪孤舟相逐飛花去一日看山到武夷送盛斯徵赴長沙昔愁越巂千峯仄轉入巴渝萬里賖豈料聖恩憐賈誼猶煩佐郡出長沙蠻中瘴逺三湘水江畔春逢十月花遥聽岳陽樓上笛可能迴首憶京華貽吳叟鬱彼丘園叟居然松竹姿生涯隔城郭流水到茒茨乃識堯仁大誰言静者私中山多法酒高㑹及良時歲月老將至耕桑樂在兹鹿門姻婭地從此接龎眉寄憶一十九首九日期登大慈恩寺閣不果寄獻吉悵憶青蓮宇今朝黄菊開遥知逺公笑不見白衣來窈窕人天閣峥嶸日月迴山川紛楚望城闕動秋哀峴首羊公石淮陰戲馬臺風烟那可即逸興杳難裁强負登樓作虛傳落帽才此時遥獨酌念爾重悠哉唐生將卜築桃花之塢謀家無貲貽書見譲寄此解嘲余昔攀白日虹蜺干紫庭浮沈帝座側無人知歲星側侍公車無所歡聊騎天馬出長安南下蒼江浮七澤還攜謝客㺯波瀾青倪中開秀廬嶽瀑布灑入千峯寒㝠㝠仙氣貫南斗直欲凌身燒大丹迴裾西拂巫山浦浩蕩歡心間雲雨歸來欲奏楚王書漢主上林方好武黄金不遇心自吁白璧無媒翻見侮昨日結交燕少年酣歌擊筑市中眠正逢天子失顔色奪俸經時無酒錢入門百結鷫鸘盡笑立文君明鏡前却思舊日高陽侣黄公酒壚何處邊天下綈袍誰不憐郄卿未具山中槖何人為買剡溪田唐伯虎真俠客十年與爾青雲交傾心置腹無所惜擊我劎拂君纓請歌鸚鵡篇為奏朱絲繩胡為擾擾蒼蠅之惡聲我今蹭蹬尚如此嗟爾悠悠世上名寄華玉去歲君為薊門客燕山雪暗秦雲白馬上相逢脱紫貂朝回沽酒城南陌燕山此日雪雰雰祗見秦雲不見君高天白鴈南飛盡千里相思那得聞駕出南郊退簡邊喬二太常齋殿鑾輿下郊宫鳳野開霜戈迎日動芝葢拂雲來輦道前旌直鈎陳翼騎迴甘泉枚朔侍詞賦接仙才人日柬李員外出陪郊祀咫尺東曺彦相思隔暮雲仙源懷獨往青鳥信難聞齋館逢人日天行望羽軍聖朝郊禮秘應待長卿文秋日懷李郎中及邊熊二君子五首秋興因高賦雄才憶省郎山川思不極雲樹莽蒼蒼對酒知時變看花恨别長如何霜後鴈猶未達瀟湘借問關中友新詩近轉多風煙興難盡揺落意如何熊子元相得邊丞定數過誰能念離索樽酒邈山河昨日逢京使聞渠再轉郎未妨文字癖祗益簿書忙退食遲宫旭鳴鐘候省堂祗應騎瘦馬緩轡漫成章每憶邊庭實才清官更閒齋心禋祀裏覃思藝林間名致諸公早詩卑大厯還曹劉塵未逺任爾好躋攀熊子今何在秋應奉使還威侵蕃部落旌遶漢闗山沛澤從天降三軍動地歡思君問邊略何日接清班是時士選犒軍居庸關事載士選墓志於武昌懷獻吉五十韻豈是乘桴客棲棲鄂水陽故人多放斥吾道轉凄涼寵辱今如此沈憂不可忘隋珠元按劎荆璞自離殃似爾青雲器誰言世網傷王風紛墜地冥契獨升堂逸擬曹劉駕清聫沈謝行列星分漢署白雪映仙郎能使尚書重深揚國士光在公勤夙夜於古凖羔羊側席遭仁聖求言渴禹湯靡躬懷骨鯁有䟽削豺狼那信黄金鑠萋然貝錦張孤誠迴日月萬死出風霜直道焉辭辱庸夫或笑狂始知天德廣曲納海流長賈誼猶投楚鄒生故泣梁如何捐虎口忽已訝雲翔我識從偕計觀風美大唐謬通仙籍末賜對玉墀傍食粟真為竊河清詎有常寧論供黼黻祗爾奉趨蹌乃遘同心彦陪游古藝場夜間堪秉燭日旰尚含香莫逆談恒劇從容寢不遑允求諧比興端可發宫商䟽越宜宗廟華蟲傍衮裳淵衷深禮樂文化蔚巖廊豈謂奄徂落還應厭治康雙傾泰陵淚俱斷杞人膓赤子居猶喘蒼天意叵量河山開紫氣符瑞轉宏綱漸厯輿圖逺欣瞻帝座昌聲靈掃烏合英德邁龍驤姬旦匡周室相如侍武皇俄看霾霧鬱半覺老成亡鱗逆攖須斃乾行斷自剛内林鴟啄吻丹闕彗浮芒逐客無寧跡窮途不裹糧厲堦生枳棘芬餌挂鸞凰西去仍秦苑南歸定汴鄉驚飛憐帯繳欲往嘆迷方憶向青門别重凋季月芳㡬時申契闊繇此卜行藏太潔為身累虛名與世妨悲歌空骯髒中路惜彷徨潜伺亨陽復終焉履善祥達人聊麴蘖隱士且庚桑鴻鴈紆闗塞江流極楚湘遥知懷逐侣一為奠椒漿寄子容芳月高堂宴辭君楚水游那知臨歲晩猶此對滄洲津煖空雲度江明霽雪浮新詩仍自惜何以慰離憂寄獻吉昔聞已卜扶溝廬為復還從河上居嵩雲洛日迥在眼鼉沬蛟渦愁故墟一掬那傳少陵淚經年不見茂先書荒村豺虎眠難穩好共滄江學釣魚閒居懷泰公閒居習禪觀虚獨長心苗萬境一澂澈諸天何寂寥香飄桂子月齋近菊花朝坐憶東林老從誰過虎橋過喬侍郎省中因懷獻吉東掖當年署長廊故栁斜久辭陳子榻重謁謝公衙㕔事垂蛛網高簷噪晩鴉風烟那可憶飄泊惜瑶華庭實久約攜酒見訪不至貽詩嘲之九月秋風吹破廬長安城中愁索居籬邊未見陶潜菊門外空傳長者車黄塵鬱鬱倦為客肺病時時强著書聞道白衣將送酒荒蕪庭徑擬親除感興懷獻吉客舍秋風動客哀殘花秋日伴殘杯虛名久愧為身累白眼那能免物猜落魄京華空老大旅魂江漢好歸來山川矯首浮雲迥倚杖遥登何處臺聞庭實上計不與悵然有懷軺車十月四方來奈爾辭天獨未回逺在荆南淹蜀盜祇從極北望燕臺子山涕淚秋難盡杜甫干戈老更催牢落梅花江閣迥肯􅂸碁局負深杯寄杭東卿西湖十月烟水平梅花參差千樹明越王城畔氣應早林逋宅邊江更清驛使章臺空寄别霜天玉笛暗沾纓故人若有揚州興為聽春鴻白雪聲迪功集巻三
