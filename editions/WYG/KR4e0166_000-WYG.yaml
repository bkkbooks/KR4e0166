body:
  text: 迪功集别集類五明提要臣等謹案迪功集六巻附談藝錄一巻明徐禎卿撰禎卿字昌穀吳縣人𢎞治乙丑進士官大理寺左寺副坐失囚降國子監博士卒年三十三平生論詩宗㫖見於談藝錄及與李夢陽第一書如云古詩三百可以博其源遺篇十九可以約其趣樂府雄髙可以厲其氣離騷深永可以禆其思然後法經而植㫖繩古以崇辭或未盡臻其奥吾亦罕見其失也又云繩漢之武其流也猶至於魏宗晉之體其弊也不可以悉據其所談仍北地摹古之門逕特夢陽才雄而氣猛故枵張其詞禎卿慮澹而思深故密運以意當時不能與夢陽爭先日久論定亦不與夢陽俱廢葢以此也王士禎稱黄庭堅自定其詩為精華錄僅三百首禎卿自定迪功集亦三百首此本凡樂府四十四首贈答詩十六首遊覽詩二十五首送别詩四十首寄憶詩二十一首詠懷詩十二首題詠詩二十一首哀挽詩三首共一百八十二首不足三百之數而五巻以下則為雜文二十四篇題正德庚辰刋前有李夢陽所作序亦稱六巻當是原本不知何以與士禎所言不符豈士禎所見别有一本歟乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀迪功集原序徐迪功集六巻并談藝録子容寄我豫章予即豫章刋焉印傳同好意表迪功文云初迪功亡京師也予在梁子容訃予曰昌榖遺言子序其遺文於是手其文歔欷久之曰嗟乎予忍序吾友文耶麟鳳芝寶世所希遘見遘見之而遽夭滅亡也天生之故奪之邪抑生不生生而脩或短非天所諳哉迪功以文賦起吳中十數年間鷟翔而虎變彬彬乎出人士前矣然竟轗軻夭滅亡也凡此天果弗諳之邪乃予觀李唐人李杜轗軻勃賀則天未始不憐才流涕也然猶異代足寛解孰謂親遘見之如迪功者云客曰氣積久斯漓三代以後聖人罕生孔子以周末故不得位觀其大可占其細若是則魏徴將為鬼魅之説非邪客曰羣體迪功奚以之也予曰談藝録備矣夫追古者未有不先其體者也然守而未化故蹊徑存焉雖然辭榮而躭寂浮雲富貴慷慨俯仰迪功所造詣予莫之竟究矣今詳其文温雅以發情㣲婉以諷事爽暢以達其氣比興以則其義蒼古以蓄其詞議擬以一其格悲鳴以泄不平參伍以錯其變該物理人道之懿闡幽剔奥紀記名實即有蹊徑厥儷鮮已修短細大又曷論焉不載迪功履厯以别有志述北郡李夢陽序
