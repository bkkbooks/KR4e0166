body:
  text: 迪功集巻一明徐禎卿撰樂府五十首槃舞歌辭靈芝華華洞房鳳凰儀儀九章生逢盛世聖祚長陛下承基人悦康鼓𤣥瑟吹鳳簧八音翕合而鏘鏘坐者忘疲聽者哀以傷且為樂壽萬年何用􅇶惕懷虞殃主獻前致辭賓酬跪奉觴命如晨風葉倏忽聚散允無常及時秉燭逰日月不我將鷄號旦旦鶴鳴瀼瀼諸君慎勿離席而東西具我粗飰進糝羮日團圞升扶桑次衡陽倒君衣服君裳考鐘擊鼓㑹明堂日之方中朝既昌蠻夷率舞鳥獸攸行陛下黄耉福履無疆閶闔行閶闔開道顯通今時當太平鷄鳴狗吠相聞於國中民生苦不樂朝作暮不舂生何以樂時哉雍豪右不貸法郡縣吏愛農徭賦壹稼穡穠兵訟以息民無夭㓙黄河水清出龜龍願我皇帝壽與天侔無終窮逰俠篇四牡服朱軒俠氣何翩翩夕騖邯鄲道朝馳函谷關千金飾冠劒寶服芳且鮮徒御若雲浮周道直如弦堂中養死士被服皆珠紈􅌴馬厭粱肉貝甲委如山片言傾五嶽萬乘慕其賢諸侯奉白璧為壽巵酒前合從連趙魏駕轂出齊燕仗劎歸質子矯節奪兵權皦皦日中議㰱血重一言鷄鳴脱虎口狗盜乃獲全天地相盪蝕四海如沸淵憑軾一抵掌解紛談笑間縱横負竒節逸氣蓋八埏慨慷功名㑹何言七尺捐䇿勲山河溢流光竹帛鐫何為坎􅇄士撫劎獨長歎猛虎行上山晨採樵下山逢猛虎深林叢薄不可度熊貔巉巖兮向我怒虎欲食我低頭據地而長號使我心悲淚如雨舍中無人言父與妻爨下又無食使我孤兒啼拔劒前致詞爾胡不仁至此為稜牙鋸齒食人之肝拒骨而撑屍膏血布川谷鳥銜其肉倒挂東南枝惻惻草野中行哭聲正悲嬌女行採桑道逢野虎搏食之倉浪之天更不慈猛虎瞑目若揺思便復舍我置道傍我欲東歸河無梁綿綿邈邈思我故鄉嗟爾行路人猛虎當闗慎莫行思我父母多苦辛吁嗟猛虎白額貍斑而黑文何不渡河而去從彼豺狼羣城中咆哮竟夕聞吾將訴汝於泰山君猛虎行且莫歌泰山之君奈若何苦寒行凜凜朔風運悠悠𤣥象馳北鄙何蕭條漠野恒凄其崇霜依岫結峨冰憑岸滋飛沙塞門黄代馬厲長悲漂漂宻雪興靉靉繁雲垂窮獸啼原澤飢烏號樹枝無衣嘆秦風卒歲咏􅃎詩伊余炎荒士飄颻寄邉陲風土有本性狐貉非所宜飲漿豈執熱懷纊猶抱絺處燥常畏瘍思涼誠惡痺寄謝父與母游子難久居榆臺行按榆臺戰在𢎞治乙丑年榆臺高以臨匈奴匈奴之罪當夷戰不利師被圍師被圍士無糧渴無漿拔劎仰天訣壯士餓死亡棄尸不保蹂藉道傍嗟爾從軍之人行不來歸奈之何心傷悲白紵歌四首三星爍爍花滿堂素腕盈盈出洞房垂羅映縠耀明妝皦若雲中開月光流情盼君君莫忘停歌節舞進玊觴願君安坐夜未央中庭桃枝連理傾瓊巵含霞玉醴盈歌舞君前流目成絲桐順耳感人情持觴把袂君不違願作梁間雙燕飛㫖酒千壺列東廂美人如花嬌北堂齊歌合舞聖世昌願得歡娛永未央脂車秣馬且踟蹰百年之㑹忽須臾東流之水西飛烏今我不樂何為乎炰瓊膏擊素鮮金弁峩峩賔四筵趙瑟高張調蜀絃長袖翩翩陵七盤華歌妙舞及春妍蘭苕參差桃欲然上天明明降醴泉皇帝陛下壽萬年步出夏門行逺㳺躡泰嶠高舉凌雲門白日駐華葢丹霞耀飛軒螣蛇載霧興𤣥鶴憑飇鶱玉女從白鹿青龍挾兩轅左顧叔卿笑右接洪崖言長松䕃列坐六博遡芳樽嫋嫋祥風被郁郁華芝黁沐余逝咸池晞髮乘崑崙輕身倣鴻舉長嘯若雲翻下視塵世徒鼠腐寧足論鷂雀行白鷂捉黄雀斜盤下九天豈知南山側復有虞人弦一發中雙翼忽斃青雲端行人皆撫掌仰視落飛翰弓矢懸馬頭少年坐雕鞍將歸咸陽市百鳥爭聚觀美酒白玉缸肉腊黄金槃樂哉今日宴四座俱萬年元㑹曲蒼木肇皇紀朱光熈泰元明堂八軌湊洛邑四方尊河山週武衛表裏殿師藩鏞鼓天上合冠葢日中屯玉帳雲龍㑹南山椒栢樽穆清乾極拱優渥奉華恩慚非白獸客虛承象魏言將進酒將進酒乘大白硨磲為罌錦作羃燕京杜康字琥珀朱緡三千酒一石君呼六博我當擲盤中好采顔如花鴛鴦分翅真可誇壺邊小姬拔漢幟壯士失色從喧譁拉君髯勸君酒人間得失那復有男兒運命未亨嘉張良空槌博浪沙秦皇按劒搜草澤竪子來為下邳客一朝崛起佐沛公身騎蒼龍被赤舄滅秦蹙項在掌間始知橋邊老人是黄石狂風吹沙黒漲天天山雪片落酒筵錦屏繡幙不覺煖齊謳趙舞繞膝前人生遇酒且快飲當塲為樂須少年何用窘束坐自煎陽春豈發斷蓬草白日不照黄壚泉君不見劉伶好酒無日醒幕天席地身㝠㝠其妻勸止之舉觴向天白婦人之言不足聽又不見漢朝公孫稱鉅公脱粟不舂為固窮規行矩步自衒世不若為蝨處褌中丈夫所貴豈窮苦千載倜儻流英風人言徐卿是痴兒袖中吳鈎何用為長安市上歌擊筑坐客知誰高漸離我醉且倒黄金罍世人笑我餔糟而揚醨吁嗟屈原何清漁父何卑魯連乃蹈東海死梅福脱帽青門枝明朝走馬報讎去襄子橋邊人豈知江南樂八首代内作生長在江南不愛江北住家在閶門西門垂雙栁樹陽春二月時桃李花參差寄言諸姊妹莫遣惡風吹還鄉信自樂望近轉於邑阿母見兒歸定自持儂泣野鳬生雛時乃在河沚中可憐生羽翼各自戀菰叢橘生江上洲過江化為枳情性本非殊風土不相似人言江南薄江南信自樂采桑作蠶絲羅綺任儂著與郎計水程三月定到家庭中赤芍藥爛漫齊作花江南道里長荆襄在何處聞郎昨夜語五月瀟湘去隴頭流水歌三疊代内作隴水嗚咽流各自東西下生男不下堂生女棄中野下隴磨剪刀刀澁指爪柔將刀斷割水那用東西流隴水鳴不止似聞阿兒語出門不見人肝膓斷絶汝王昭君金裝嬌玉驄結束事和戎獨去白龍道遥將黄鵠同紫臺留漢月青塚落邊風萬里琵琶曲流悲入漢宫從軍行五首獵火照燕然匈奴寇朔邊昨夜飛符至將軍出酒泉魚麗天陣合狐塞伏兵連一鼓旄頭落長驅捉左賢横行黑山外凱入武威川萬古清沙漠常令無塞烟貳師將軍初出師横行十萬羽林兒隔河追斬呼韓將烏壘高懸太白旗五壘神兵下玉門倒傾西海蹴崑崙輕車夜渡交河水斬首先傳吐谷渾調笑名王坐玉鞍蛇矛丈八奮如湍天子戎衣遥按劎將軍直為斬樓蘭青天磧路挂金㣲明月洮河樹影稀白鴈哀鳴飛不度黄雲戍卒㡬時歸結客少年場行驪馬窣青絲閭里争耀馳朝游吳姬肆暮入屠沽兒袖中挾匕首跨下黄金鎚然諾杯酒間泰山心不移東市殺怨吏西市仆讎尸裂眦白日變英風拉如摧突過銅龍門電影忽如遺司𨽻徒斂手行人莫敢窺横行三輔間法令不得施壯義冠千古雄聲流四垂少年行生長在邊城騎射有聲名召募河源去長屯都護營登山望敵氣間道出奇兵十決推雄戰連呼拔虎旌雲中息刁斗天上掃欃槍坐㺯胡笳月梅花隴水清平陵東行共工觸天補女媧后羿射之摧九烏君不見泰山之高屹天柱有時東崩海水枯秦人築長城西笞羌戎北匃奴開闔地户天下樞九關虎豹下食人髑髏飛血昏風塵四海望之威天神亦有荆軻起報讎裂眦向天天為愁拔劎一呼走萬乘快哉壯士誰與儔儒生抗眉論堯舜斂手待烹良可羞上卿執珪古所侈魯生棄之若敝屣鴻毛輕死為二桃笑殺田疆與冶子龍蛇消息各有時白石落落人豈知季布髠為奴范雎乃是糞下兒一朝雲雷起屯厄揮刃脱縛揚高眉我今傴僂困螻蟻吹沙吸呷若鮒鯉牛涔蠕蠕豈足活河伯向我誇秋水夜夢憑雲忽上天傾山倒海作龍淵天門中開繞赤電霓旌雷車導我前空山颯颯走霹􅋬草木摧拉飛炎烟丈夫未足哀困窮仰嘆白日回英風不能鼔行青海上亦當擊劎於咸陽之市中寧學鉏麑觸槐死羞言投閣仕莽公吾悲夫二子之死也誠如寒蚓之與秋蓬長安曲玊館瓊臺接紫㣲長安甲第有光輝夜夜錦燈車馬散平陽歌舞月中歸燕京四時歌春天栁垂絲拂建章銀冰千片落金塘烟花萬國行人度遙指蓬萊春日光夏暑殿金泉枕碧山清凉樓閣五臺間赤日不行葱嶺北雪花長繞玊門關秋薊門桑葉落滹沱代北浮雲鴻鴈多莫向雲中傳尺素空將明月對嚬蛾冬葡萄新酒潑流霞十月燕山雪作花天子後庭誇玊樹昭君紫塞拂琵琶擬古宫詞七首君王無事日臨戎韎韐親調白玉弓千騎紅袍齊扈蹕臂鷹遥出建章宫千塲搏戲未言回魚鑰重重向暮開遙聽雲中催羯皷君王何處打毬來劒舞戎歌樂未休煌煌芝火五城樓班姬獨卧昭陽殿卻捲珠簾望女牛十五承恩侍衮旒宫中初拜大長秋見説上林陪羽獵君王同著紫雲裘興慶池頭漏未闌棃園弟子曲將殘花前更進凉州伎無那西宫月色寒馳道毿毿御桞垂春風挾彈羽林兒武皇親御長楊殿勅與龍駒控鬛騎狗監離宫承宴歡掖庭通晩不迴鑾那能夜夜長門裏銀燭薫衣待漏殘雜謡四首按此皆紀正德五年八月之變也夫為虜妻為囚少婦出門走道逢爺孃不敢収東市街西市街黄符下使者來狗觫觫鷄鳴飛上屋風吹門前草肅肅壞我民居田樹子桐與檟桐檟何青青素車不得下狐彭彭兎逐逐反顧奔以北彎弓來彎弓來沼我乎逵兮築子之棲兮木槿隕落巢安歸兮迪功集巻一
