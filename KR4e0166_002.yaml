body:
  text: 迪功集卷二明徐禎卿撰贈答一十八首學謝靈運賦華子岡詩贈趙建昌朱巒蔚靈奧雲海互盤旋隂霞絢石室夾篠蔽清漣翠羽紛啁哳瓊蘂合芬妍桂嶺屯蒼靄桃蹊迷紫煙朝登郡樓望佳氣鬱蔥芊挹景企嘉客臨風懷羽仙冥賞非偶愜神理豈虛傳建德寡民務山水發清絃順性奚矯迹知道在忘筌非君秉淵尚兹理誰為宣酬贈方周二子弱㺯寄觚翰中歲慕沈玄浮章粲華囿精理密真詮𢎞述允大道忘言亦自然常恐良時暮蘭苕豈久鮮遊情倦素藝委志脫玄蟬流觀宇宙內尚友羲皇前方生振文綺周子攬𡨕筌清論澄秋水溫藻發春泉跂豫慕二美猗子企前賢乃愜同棲志忽枉瑤華篇氣感聲必合迹異理無愆永保日新願均期善自全寄壽前冢宰王公三十韻乾化昭於穆炎明浹世仁涵濡存一德覆載表英臣伊昔稱專柄公才獨邁倫沛霖孚碩望柱石秉鴻鈞補衮山明火為賢甫及申真能壽元氣何啻觸龍鱗苦節深盤錯孤心契靖寅蒼生多起涸時俊總依塵利澤江河運威靈泰華峋台衡惟直道社稷一微身歲序成功去林泉此志伸人心思几杖吾道卷經綸皓首歌淇澳青雲絶渭濵中軍傳午子緑野蔭霜筠繫國安危舊逢時繼易新培生賴天地屬望在庭宸存問王言渥玄纁禮數頻高星臨寵使窮谷播陽春慶舞狂童稚詞章湧縉紳優遊不知耄弧矢忽兹辰箕子推洪範莊周記大椿形骸全矍鑠學術愈精純梁木咸傾仗元龜識泰屯已能回眷注還擬下蒲輪愚也東南士叨為髫齔民甘棠徒自倚品藻託無因諫草占心赤丹青得貌真山中煉金石霞外隱麒麟漢相久辟穀應侯長謝秦悠哉瞻佇迥北斗挂天津古意二首贈劉子空為郢中客不見郢中吟美人高堂上自奏山水音帝子葬何處瀟湘雲正深寂寥誰共賞江上獨傷心楚妃一失寵獨宿楚江陰雖念容華落終憐繾綣心聞説章臺畔畋遊歡自淫今日宫中事不言讒妬深贈錢元抑錢郎毛髮鬈且䰄秀骨插鬢蒼崖開驊騮黯黯有竒氣一蹴萬里空長埃今之畫工不可數畫馬無過曹韓武吳生落魄筆有神不求貌馬求貌人英物由來豈殊相麟鳯聖賢俱絶倫却恨丹青損真趣獨事玄毫拂紈素生象蠕蠕指間出大巧無乃遭神怒故人三歲不相見開圖忽訝錢郎面小兒八歲快目睛問之嘻然呼姓名嗚呼畫馬雖工只畫形風雲道路俱冥冥豈知錢郎貌如此馮馮大腹儲滄溟高蹄昔蹶未可輕今日近前凡馬驚吳江之湄浙之涘我行於南從此始掉頭不見眼中人寂寞行歌向湘水贈張注先生蚤得投簮理緬欽遺俗情丘園白日靜眉宇紫芝明上德綏多祉賢孫復令名道全身愈泰慮淡物俱輕壽酒山人勸柴車縣尹迎坐臨沖逸境於此學無生靈隱寺贈靜公聞有千年寺長松信許深沖虛半樓閣落日更登臨舟楫窗中小藤蘿天際陰江流明暮靄石澗響空林蟠據雄都會風煙異古今幽真余有慕詩義爾能尋雲翼無言健淵魚本自沈終期白蓮社來就玉山岑答沈休翁所問因成贈章六齡識姓字十歲㺯歌章十二失慈母嬉戲道路傍十七學干祿跅􅕟空倣徨幸逢黃河清昭映白日光聖心勤草萊猋逐雲羅翔謬以跌宕資置之枳棘場雖有魯連節濩落無所將揣摩笑蘇秦况乃章句行不見樊籠羽冥心在八荒飄颻碧雲緒夢寐嵩山陽飲水心自足懷哉桂樹芳朅來荆巫渚傲然稱楚狂夫子挺喬嶽時人呼鳯凰一隱不世見鄰父徒窺牆而我愛逸調談笑登其堂永符金龜契豁以歲年忘豫今入衡山訪道躡飛梁倘遇洪崖子遙傳紫汞方與君變白髮攜手共徜徉王敬止御史始竄海南繼移永嘉令自燕中迎養珠崖昔長竄連州始量移借問東甌土何如南海湄霞標建台嶽桃源帶武夷鴈山榮桂樹象浦合珠漪玉羶非一族海錯被珍竒金盤湛碧露酒名黃柑滿緑枝歡此三春日復愜暮秋時鳴琴坐高館撫景臨華池迎輿侍潘令進酒舞萊兒顧以今時笑還瞻昔朝離豐澤亨雷雨瑶草變芳蕤永嘉多懋宰建德易絃絲昔慕文翁化文宗儒昔宰永嘉有聲今蒙葉尹慈長沙非舊謫宣室契前思光華冀一接胡越詎能追河東欲有獻及此汾陰祠對雪贈客雜絮下璚霙飛滿洛陽城仙人深雪裏獨戴鹿皮行高卧思安道攜琴就阮生竹林陪素蟻兔苑玩流英誰言剡水棹今日在瑶京酬邊太常於燕山見憶之作故人惠思我百里寄瑶音獨在山中宿松齋清道心霜鐘流夜壑曲澗入幽深寂寞悲千古橋陵梓橡深石川子歌石川子隱於魯門之西長牽青牛飲素溪有時駕之驂文貍驂丈貍乃至岱宗之巔弱水之湄石門迢迢上通天玉京金闕光陸離過謁太山君道逢赤松師授以長生説鍊氣服食除三尸青泥丹鼎子善治玉柈他日如相贈共爾商山歌紫芝贈王淵之并序淵之故遊濩落草年頃來京師將從卑宦霜霰被鬢風塵改容飲以巵酒并為歌以贈之君不見十月狂風吹白雪長安城中地欲裂朱門酒爐紅炙天空裏瓊花旋消滅由來都國盛繁華青雲絡繹滿仙車浪説黃金賜寒士爭言白璧謁侯家驕矜意氣遙相羡片善朝推蒙夕薦待詔虛沈金馬門傳宣直上麒麟殿王郎濩落爾何求千里乘驢被黑裘空論作賦稱才子未肯低眉事貴遊知君不得逢楊意終愧明時老督郵答顧郎中華玉昔居長安西今居長安北蓬門卧病秋潦繁十日不出生荆棘牽泥匍匐入學宫馬瘦翻愁足無力慵踈頗被諸生譏虛名何用時人識京師賣文賤於土飢腸不救齏鹽食去年作吏在法曹月俸送官空署職牀頭一甕不滿儲囊裏無錢作沽直歸來困頓不得醉兒女荒涼婦嘆息今年調官去懊惱苦笑先生祿太嗇釡中粟少作糜薄白碗盛來映膚色丈夫但免溝壑辱日飲藜羮勝羊肉平生富貴亦何有羸軀幸自弛耕牧但願時豐民物安官府清亷盜賊伏人歌鼓腹厭梁菽先生雖病甘苜蓿一朝雷雨濯亨衢坐見諸公執中軸先生翛然卷懷退茆齋歸向南山卜各賦隱士得魏仲先贈金陵顧徵士何處蓬山宅汾陰傍漢宫冥棲紫芝客長嘯緑雲中忽佇甘泉駕遙尋河上公玄風那可掇大道本難窮夫子金陵隱心將靜者同瓊枝無以獻歌此寄喬嵩答獻吉花發平章宅鶯啼省樹春殷勤花鳥意愁殺獨遊人王員外不解參同契但索一詩許以遺我率爾戲之王烈持洞章茫然不能讀石氣銷紫煙十年祕空簏從來楚史識三墳阮籍焉能辨赤文一自華陽窺妙訣緱山夜夜鶴相聞遊覽二十五首入沛落日遍草色遊子入沛鄉如何緬兹土能令心慨慷道逢守津吏問客來何方一為陳風俗三歎久傍徨前者二尹家會客具酒漿遣吏出市物吏私入已囊尹訊卑以紆吏言伉以張回身赴入河尹懾親扶將矯矯鷙悍風重忿復輕亡由來英雄氣儻蕩出芒碭余聽此言立側想大風章撫劎一為歌春宇無精光原野厲長飇飛鳥不遑翔瞿瞿蟋蟀歎悽惻感陶唐謁嚴子陵祠言訪羊裘隱荒臺迹宛然巖崖祠屋綴天漢客星懸伊昔風雲感丘園束帛戔神龍不可係造化獨深全去矣孤蹤邈懷哉大澤偏釣竿何嫋嫋石瀨故濺濺郡以高名著山依汗簡傳餘風猶激懦聖代更招賢圭組誰憐辱襟期本尚玄終焉赴空谷寤寐白駒篇彭蠡茫茫彭蠡口隱隱鄱陽岑地湧三辰動江連九派深揚舲武昌客興發豫章吟不見垂綸叟煙波空我心與江夏尹餞于舍人于黃鶴樓未有干戈地能令棟宇全乾坤餘壯觀荆楚鬱山川鶴唳寥天迥江深禹廟前舟檣控南北節鎮此旬宣令尹乘時暇使君同祖筵炎蒸飄不到虛爽境何偏乃繼登臨迹空懷作者賢風煙一回首今古共凄然握手將安適經秋未擬旋迢迢沙際月遙憶桂陽船在武昌作洞庭木葉下瀟湘秋欲生高齋今夜雨獨卧武昌城重以桑梓念凄其江漢情不知天外鴈何事樂南征廬山豫章山水郡廬嶽此深蟠吳楚開雄鎮東南表巨觀中天浮黛色百里曖晴巒漸近雲消豁俄驚勢鬱盤錦屏圍合沓玉笋屢叢攢詰曲群形變登臨萬象寬風高六月雹氣栗九江寒石鏡明花外香爐出霧端劍芒遙矗矗龍脈故丸丸瑶草幽難掇青蓮秀可餐赤城虛瀑布彭蠡更波瀾禹迹於兹盛崇功振古刋壯懷凌絶頂倦鳥息飛翰霄漢心何有沈冥性所歡將修梵門術欲上羽人壇淨社花垂白名巖竈覆丹昔賢非不達於道自相安愛勝真忘返遺榮亦未難聊須偃松竹遂可挂纓冠祗為懷佳侶淹留獨寤歎江上逢許員外杖䇿下天門揚帆楚江水長風吹客心倏忽墮千里千里何青青離家幾日春忽逢天上使云是故鄉人褰帷一共笑宛爾平生親聞子金陵來衣滿厯陽塵握手起情慰依依多所陳君家石橋下與我十室鄰海內各分散白頭常若新葉散根株連諧合固有因由來吾黨士多作帝鄉臣况爾發靈裔吳山傳秀神感此不見遺肯與凡礫倫邂逅一草草馳驅還苦辛君發李陽河豫留貴池口脈脈兩情遙胡寧棄我後昨日到同安青山待余久解我碧雲裘長松挂虛牖雙童進草飯遇我情彌厚庭中好鳥聲嚶嚶自求友春風吹緑楊十日暫分手豫今發武昌早晚下瀟湘仙人黃鶴樓待子洗壺觴君乘山公馬訪俗過蘄陽還呼黃鶴仙醉舞雙徊翔八月涼風發君言及豫章三春煙景暮余定達吳閶男兒衣錦貴那不歸故鄉為君邀族人出郭具壺漿徑須愁痛飲别後莫相忘曉下廬山下山鼯鼠啼藤竹使人迷多謝東林月殷勤過虎溪登支硎山樓遲遊侶谷寺憐幽密茲樓表麗觀煙雲塞壑動竹樹入門寒獨往迷前徑憑高遲所歡時聞有清磬遙出暮林端登半塘寺閣夙有山水慕苦為形役拘淡兹夏日永聊得狎浮圖攀雲凌廣閣靄靄見吳都諸川散林上平野鬱芬敷法花垂縹眇晴采動虛無煙火下方雜昏明時態殊境超自生樂疲心忽重蘇因傷人世子擾擾即長途曉思月落晨渚前雞舞春檣側榜人起蓬垢折薪候炊食踈樹發東光熠熠泛水色關吏始通津起柁指鄉域攬衾渺余望垂鬢深不測浩歌忽以仰夷猶羡雙翼吳舍人園亭新年風景地休沐竹林人魚藻含泉動楊園聽鳥新夕陰連九陌喬木俯千鄰虛負高陽興多慚酩酊身長陵西望泰陵二首新宫猶藹藹白露已蒼蒼詎識神靈逺徒悲劎舄藏陰風振大漠落日照漁陽稽首攀松柏雲天灑淚長昔送宫車出長悲西雍門今來寒食節獨望灞陵園杳杳仙城閉萋萋封樹繁當時侍從客慟哭幾人存九日逰眺三絶句頻年搖落寄邊州無賴今晨強出逰從教烏帽欺人髮不耐黃花亂客愁北來隴野太蕭條旅客登臨思易消天入燕關真自迥雲開碣石未為遙西門沙丘頽欲崩思望芒山強自登正愁隴樹糢糊甚更著浮雲蔽泰陵秋日過故尚書吳公池館二首平泉舊時里秋日永亭開苑樹澗陰合魚梁山照來野人臨逸釣公子進新醅興盡何須謝垂鞭醉即回不見尚書履階陰空緑苔菊荒三徑在棗熟衆禽來迹為憐幽駐圖因好事開秋風懸劍處落日首重回晚過獻吉齋所端居聞子肅清修吏散鴉啼省署幽芳草不知人獨往空山何意鳥相求開軒厯厯明星夕隱几蕭蕭古木秋自昔風塵堪吏隱浮生莫遣有離憂嘉禾道中檇李城何在蕭條草樹存未醒吳苑酒已動越鄉魂問水來天目看桑過石門愁聞鶺鴒語寧聽楚山猿浙江驛下作自嘆南浮客﨑嶇驛嶺遙川途淡斜日鉦鼓逺揚橈水勢含滄海山形折落潮夷墟不可問徒使旅心搖舟懷天曠多樹林日赤溪路永我行一何勞窈窕泝川嶺湍流好石鬭沙礫與舟鯁行行指前栖望望不得逞火雲漸曖滅蟬鳥空山靜奄忽青松間了了挂圓景一與幽賞遇遂使煩慮屏先書謝廬僧為掃香爐頂過梨雲精舍逺師耽宴寂趺坐石牀深留客開香積談玄就竹林煙藤結暝翠雲磬下空音淨現青蓮色懸知出世心漢陽逢故人銀鞍白馬渡江來江上相逢一笑回若􅂒漢江無咫尺思心何事日悠哉迪功集卷二
