body:
  text: 迪功集卷六明徐禎卿撰書論序記碑誄與李獻吉論文書足下奉書幸甚尋已口復卒卒猶不既愚臆也僕少喜聲詩粗通於六藝之學觀時人近世之辭悉詭於是唯漢氏不逺逾古遺風流韻猶未艾而郊廟閭巷之歌多可誦者僕以為如是猶可不叛於古乃攄其性情之愚竊比於作者之義今時人喜趨下率不信古與之言不盡解故久不輸其說恐為伯牙所笑乃一日遇足下而獨有取焉何也足下又謂僕間於賦頌之文夫賦頌者誠文章之瑰偉余心之所希艷也始吾誦屈平之文以為時之變也然麗而不淫哀而不怨蓋無惡焉及誦司馬長卿之言靡麗浩蕩不可窮矣雖絶特之觀非盛世之所見也雄於長卿何所樂羡乃蹈襲名其文而原何戾忒又作賦以反之此余所未喻者故反之以附於原之意此足下之所見也藝家之風好相誇嫉後世之文不逮馬揚而好嗤之自護其醜若趙人之持其璧而不肯下也豈不重可笑哉今足下責僕以相麗益此古之道也今何復見之僕愚戇何敢自愛恐不足以承教傷知人之明為足下羞也若反覆相示更互詳定或大有疵謬輒抵毁去不猶愈於後人之詆笑乎且文辭之貴賤存乎其人雒邑之鼎諸侯爭之非鼎之貴周貴其鼎也若徒務雕切之華而不責其實則恐為揚雄之𤣥徒取病於後世耳楩楠豫章之材所用於世者貴其實也僕雖駑德竊嘗志於是其必本道德之衷遵作者之度以繅繭襚衣生物而已豈蟬口之所鼓譟乎居之而不疑想足下與吾共之也曩申贈章祗俟來答詩曰無言不酬此之謂也答獻吉書禎卿再拜獻吉足下省報無恙及所示詩備綢繆之㫖發忞忞之懷轉詠微音若扣哀玉即日與羊何宣之莫不欷歔相對辛楚惟昔與子聫蟬裾玉周旋朝寺良時出逰則並橛而趨清宵燕寢則共衾而寐謂歡㑹其可常凋瘁抑何由至何圖人事不齊物情難豫三年之內親友零落各寄一方臨北風而依依望大梁而嘆息室邇人遐我懷如何又暌絶之後僅收所答濟上禮自輈張相背中間書問曠絶又復不審洛中人士可悉動靜靜言思之益用增勞忽奉情曲曠然開慰蓋逃虛傾耳於足音季長快心於手跡昔人之情豈戾於今也哉嗟乎獻吉子之云違我復何恨君子居易窮且樂天小人僥幸以身殉禍聞子西歸藜藿不惡其口家人不見其色既退處原野抱杖行歌沐耳清渠之濵晞髮茂陰之下而枕以六經潄以羣籍撫景則悠然賦詩臨流則引觴獨酌斯亦達士之所希生人之極歡也揆之此懷何必上同三閭下減殷中軍耶河清難俟人壽幾何願子朂之而已來命又要以佳期申以古誼夫具茨之野黃帝之所逰焉南山伊闕大禹之所鑿焉固樂道者之所棲壯士之所慕也而翼不我假天路無緣既違命駕之歡徒興失路之嘆長佩金玉以結我心若神感有徵則延平之劎必合良辰弗遘則少原之簮永遺矣書不盡言不勝於邑時因風翮努力相聞禎卿再拜重與獻吉書僕以攝提格之歲仲春南徂出齊魯之郊經淮沛之墟直視平原蕭條千里於時雉雊於野麥秀油油瞻日月之勤感東山之嘆雖窅眇傷神未足以振心而惕慮也既而道指東吳倣徨故都棲棲焉若仲尼之去魯也乃遵錢唐薄眺㑹稽控湖山以為郭環江海以為池昔日神宫嶢闕椒房綺榭之餘或巋然於魯甸徒髣佛於丘夷顧瞻周道不能不為之興哀也傍引桐江之溪遡洄富春之渚豈惟望風而思其人抑可以樂焉而終其身矣又西南行渡縠水陟常山越餘干沿弋陽山溪澗沚之濵玉水澄徹則有參差之毛丹碧之石游鯈翔泳白鳥棲止可以瑩神而悅心也橫涉彭蠡仰瞻廬嶽其波濤則騰涌奔伏噴薄日月其峰崿則盤回峭絶亘接霄漢香爐五老之形瀑布青峽之觀特為卓詭靈芝異草彌山布谷金符玉冊窮幽極𤣥信赤霄之神都老氏之𤣥宫也又西遡九江南望全楚夫其扼巴蜀之喉舌據吳㑹之上流通五嶺之門户接雍梁之要樞此其大勢也若乃鎮以衡陽之阜表以武當之山五峯森拔三門凌啓雲霞絢繪紫氣燭耀其中四候蚤暮七曜運行往往與人間殊别爰有黃金之堂白玉之所琉璃為鋪檀桂為柱制侔天居勢轢海嶽目所希見窈窕難說又有江漢之波沅湘之流洞庭之湖雲夢之澤千條萬派混原同塗縱貫脈理經帶其間極望浩漫際天薄海陽春獻而百草芳涼風至而蒹葭落猿子噭嘯鴻鴈成羣魚龍倐忽暘晦互分可以觀天地之變化驗時序之榮悴也故徵水族之饒萃材木之珍論舟楫之利及畋漁之樂九州之內未有踰於此者也然其民俗苦瘠尚利薄義户無囷廩之食人無相固之心雜以山夷輕躁易動非久安長治之國也乂其山川包絡四要固用武之場聚爭之地故東望樊口則慕周瑜之雄西顧峴山則感叔子之惠載觀荆門則悲昭烈之績極眺中原則痛武穆之忠山河昔是人物己非心傷嘆矣悽其漣如嗟乎死生命也理亂時也命有涘而志無涯時可遘而身不逮此屈原所以流亡於江夏賈誼所以憂傷於長沙者也所賴豪賢發憤映帶礪以垂名章逢樂道假竹帛以昭志生人之業庶為不朽耳僕自惟無卓犖之材寡礪鍔之用進不能揚眉於天下退不能甘心於丘壑徒放情於江海之間抗志於宇宙之表將以搜竒獵祕咀華納靈則水土而函藴法景曜以摛文聊希子長之風庶幾虞卿之志乃知于役之云豫兹遊之豈徒哉惟是足下與吾同懷遭時齟齬良圖弗遂抱膝空林之中棲神窮跡之境雖搶榆之為樂固知大鵬之逍遙也故聊述其略以當扺掌方有簿牒不盡所言崇化論夫治興有兆亂生有徵本末消息皆有漸焉知者之所卜愚者之所忽也曷言之天下將治其象清明天下將亡其象穢濁清明者何吉士並進其道尚貞陽剛以舒泰之光也穢濁者何小人在上其俗尚羣陰惡糾障否之祲也故唐虞之世百辟維寅幽厲之世其臣好佞此治亂之所由異也故君子立人之朝以嚴正為本以忠慤為節以亷直為限以羞惡為心故道義顯明風俗歸正此詩人所以嘆咏於羔裘者也若乃亷恥道喪國維殄絶于忮交門邪曲黨媚詩曰如鬼如魅則不可測鬼魅並作國胡不亡故嚴正忠慤亷直羞惡此八者賢士所恃以守身明君所藉以立國者也執其本推其用則咸熙之治太平之祥可立致也方今世遭末季大道既隱俗尚貪利而惡貧苦喜趨競而惡守𤣥阿附成風固祿吝寵依敝仍陋莫敢正色直士肆言則曰狂稚亷夫秉慤則曰茸材毁蠧擲疵則曰昧體發奸正否則曰機擯賂鼠竇者有顯譽伐炎門者有幽黜巧容默者有高爵善甘奉者有最考剝民脂者有肥蔭沽軍功者有上賞問豪贓者有疾禍禁私利者有深詬豺狼載道狐鼠成羣樗櫟雜用瓦石同鳴教化隳頓仁義不明賢直發怒閭庶呻吟此皆國政之大蠧時俗之深痛也夫明者覩患於無形智者參慮於未萌易曰履霜堅冰至豈曰無愆此衰遲之漸也夫時世消息非天地之所生實在位之咎也詩曰赫赫師尹民具爾瞻可不慎哉且衰者盛之本也困者復之漸也天地之機生生不息而况於人乎若能補過反德滌穢布新砥礪道德之朴以𢎞教化之門熏貪鄙之穴隳彊右之垣崇鯁直之節斥同比之媒則大化流通四方為極雖有稂莠良田之所不容雖有駑駟羣驥之所必踶尚何賞而不勸何摧而不伏何決而不行何塞而不止則伊旦之功不足準三五之化不足為也夫天生蒸民有物有則堯舜之世不皆賢桀紂之世不皆愚禹皋用而天下之不仁者化矣崇侯婦寺進而天下之不仁者效矣故置醢則蚋生施飼則魚聚質染則化蟲祝則似此物類相感之機也又何疑焉吾居下位非敢好訕而禍在位也誠知夫邪正之機乃治亂之原不敢以不辨也東魯韓氏世譜序韓氏瀘人也曰東魯者系於始也夫韓始於桓叔之後也何謂魯乎桓叔逺也系韓於魯斷自其所徵始也昔先王賜姓命氏所以昭祖考係宗屬别嫌疑定親踈而人道於此繇焉故夫絶者不敢以冒續也疑者不敢以强附也是謂慎之至也夫自帝王以降姓氏之變合本末之同異難可以勝言也然而導水者知其源辨塗者循其脈皆可易知也故上古之世民無亂族而禮有定宗故仁睦行而民不悖也季世澆喪夷夏胥亂民多流亡故世牒隳而氏族淆錯抑已甚矣故有宗人相夷若秦人視越人而不知恤者何也譜族湮而仁義之道塞也今天下晏謐百有餘年縉紳之家頗尚彛禮緝譜牒以厚人倫然往往由祖考等之槩莫之聞焉豈非喪亂之禍哉韓自魯散燕入蜀鼎樹者七世猗其盛矣夫本盛則末繁枝披則葉散滋蔓永久則糾􅀈紛紜而不可緒焉此訛亂之道也故述者因宗紀究旁屬崇本以定始叙疏邇以别親親所以防其流也其聞見之未徵載記之所缺則斷而刋之慎其本也詩曰綿綿瓜瓞此言循其本也將使來者尋始之末合異反同雖服盡而澤未夷則厥初之念興角弓之怨釋此述譜之志也其餘發凡雖繁而其要有五一曰紀實以昭德也二曰專爵以貴功也三曰考終以崇祀也四曰象服以永思也五曰述規以示守也此又譜之變例也返其源參其變而後子姓之道備矣或曰譜何始乎史也史以述往故革命而史作譜以明祖考故自我不書失乃謂之子姓之道乎曰聖哲作易以明天道非為天道設也所以示乎人也述史以章往非以為繩往也所以戒乎今也夫使宗屬紊滅禮教廢子姓不勤祖廟無食墳墓穢而不修此皆孝子仁人之所隱也故凖史以述譜所以明乎人倫也人倫叙則孝弟興孝弟興則禮樂作古昔明王所以崇姓氏而謹昭穆者也傳曰明乎禘嘗之義其如示諸斯乎其此之謂也𤣥溟子記𤣥溟子居海之濵觀於鴻蒙泱漭之墟察天地日月星辰之運潮汐盈虛之度於是仰而遊頽其以喜芴乎其若喪已而于于乎熙熙乎若將有執焉者也居四十年學既通始為仕仕為州司為州司必僂而趨鞅而籧篨𤣥溟子不以為戚戚也廷辱而大詬出於汚瀆之中不以為辱也或譽之不以我為能也被以不祥之名不以為不肖也屈而不縮和而清出而不怨汪乎其自肆也其斯為賢矣乎徐先生曰大矣哉𤣥溟子之觀也夫道惡乎在惡乎已今夫冠方而衣緣羣居而誦聖人之言仁義之故索稿簡析句讀窮年而呻哦以樂道也此無異求形於木俑人也詩人之詞曰鳶飛戾天魚躍于淵子思曰言其上下察也仲尼亟稱於水曰水哉水哉逝者如斯夫不舍晝夜伏羲作八卦以通神明之德亦以觀諸鳥獸之文與天地之宜夫道者載天地而不為大入毫芒而不為細淵乎希形寥乎希聲邈乎無涯涘故夫道者烏乎不在也唯善觀者為能大之循流而達順壑而趨不為戚戚不為欣欣也是故體道之要在乎大觀𤣥溟子其庶矣乎夫物窮而後見𤣥溟子之觀不窮則不能知其大也君子謂𤣥溟子得水之藴執水之用𤣥溟子既擯世將隱不欲著姓名故不書系曰維昔莊生放言自清託乎北溟齊物達變混芒以藏其真達者貴之作𤣥溟子記謝氏世睦記昔仲尼論次聖賢之德稱泰伯之德至矣余生吳中去泰伯二千餘年登仲雍之丘望泰伯之鄉愾然猶見其人又降觀於俗其人美而遜說而文巽而不毅泱泱與其有泰伯之遺風乎又尚考諸記傳得季札伯通之徒曰非泰伯其何以及此又退訪於忠信仁讓之士得世睦之族二曰范氏謝氏范氏希文之後也顯於志余故不表表其微焉謝氏者其先陽夏人也唐末徙吳越始祖崇禮為中吳節度推官子濤嗣入宋為太子賔客濤子絳嗣為知制誥絳子景初嗣為大理評事景溫寶文閣直學士景平祕書丞大理評事景初子載補太廟齊郎載子蕃蕃子昭昭嗣子寬次實實子東由崇禮至東凡九世更吳越涉宋厯元而世不衰由東而來凡八世世居於吳樂安里中無高門重奧聚子姓婦女以居竈不易薪帑不異財雞犬不異食庭無間言歡如也然吳人稍稍知之不為大章暴於世君子曰甚矣俗之衰也今人朝稅褐纓冠夕達於閭邑誦於天下嫠婦死志仁人死孝蓬艾隕而弗明此誰為重輕者哉自文武沒而大道隱人人慕功利而薄節義恥仁讓一尺之帛兄弟或毆而褫乃敢謂共室家井臼於世世邪或有誦詩書秉節尚聞先王之風而興者此其人不足尚哉曰彼哉矯飾情耳其何為勸乎余憂乎文武之道其豗豗乎將不可振也於是次其世之賢者著於篇以俟乎後之人祐字佑之逸士有道風文彥字彥達母老有末疾每抱持以行事兄甚恭平生未嘗異服食源字以澄兄沒事嫂有禮臨終著遺令言甚長厚㑹字惟貞兩試進士不第有文與弟朴甚友讓並早世二婦盧陳皆不二操昺字明仲以孝友稱故瑞州府知府贈中憲大夫李公碑文李大夫既卒其仲子憲為天子守上林苑典蕃育既而不樂進慨然歎曰昔我先大夫遺有休澤俾豫緒之乃今徒為天子司苑囿牧圉罔有奮揚以紹於先人之休吾其己矣乃上書謝病罷退掃於野奴涇之阡望其堂隧叢莽寥闃悲不能止乃躬剃草萊完宇除壁爰懼德烈久而弗揚遂伐石為文以表之曰李大夫諱良字堯臣為人魁彥羡而軼性孝弱冠遭母喪劈踊傷五內血上嘔逆痼遂抱病終身焉少好學純皇帝時舉進士第除南京刑部主事尋擢員外郎郎中治獄不設詐善窮人情明廓簡易民以不冤大司冦重可之凡諸曹疑牒輒移決焉牒就李大夫決無不人人當意願死者歲甲辰擢知瑞州府州民故輕訟好飾姦李大夫既長法令刑理又善窮人情決獄不宿於是郡治清而豪狡屏迹矣丙午歲祲民大飢李大夫善為長短補貸之法以救之全活甚衆民有掘地得大窖中錢若干緡走𨽻欲私李大夫李大夫曰此天以活吾民耳召父老㑹而散之民大悅其政體約而安惠而不費務為宏博不要近聲古稱不煩庶其近之矣李大夫讀書善推指故弱冠即為弟子師及為郎時退省中輒為學者講說循循不倦其守郡益表學宫繕垣宇進諸生必親為問難宣暢疑滯析若解觿諸生皆自以為莫及也母喪去官尋遭父憂泣血毁性竟以疾終是為𢎞治三年某月日年五十有六任重道逺惜乎其未究也李大夫之先本是縣真如鎮人也顯考綱封郎中母鄒繼朱並為太宜人娶於黃渡徐氏亦為宜人有令德淑慎其身李大夫宜之後十有二年而沒乃即故兆啓而合焉側室凌氏子二人縉憲憲貴加贈考中憲大夫妣恭人李大夫生有爵死有贈可謂高朗令終也已所著歌詩記叙若干卷藏於家文曰於惟李大夫之德若堂若彞率禮以教其民師師相厥罰惟察惟法而民用弗虐罔有干於天之威以罹其懟泣血而終曷維其罪式祚孝子寵命不匱後有觀於斯文尚敬毋毁哉文溫州誄故溫州府君文侯景範幽𤣥日以綿邁國隕貞幹士喪德程於戲奈何門生服義號慕忉惻追而誄之辭曰於昭府君軌行峻潔約迹無雙優明典術行宦逺方甌魯小邑法度顯明彊右拘攣惠化滂暢羣息咸植公朝旌嘉疏爵大廏澤及蕃畜騋牝三千服憂致疾去官歸田詔命督辟再領郡符朱輪入溫男女擁車道不得行視政未朞仁渥威宣舉直致賢姦伏杜萌狙諼格化盜不窺城平直市價繇賦稽程貪漁斷割流冗徠恩務强教誨懸書告邑男樂處業女乏淫佚睦族斷訟圜扉虛寂户不舉女連坐罪慝淵德覃波諸有喘息山海醜類翹翹首義解獷自訟公來何莫仁格后皇榖穎岐穗潔心端操不懈於位風聲騰躍布散海內宜居台鼎為世作式其十有二年寢疾奄喪招徠弗獲士民騰號鄰寀奔弔淚啜河注攀悲市道田野空耜山谷震悼回犢南駕州里悵訝不寤府君奄忽而謝故舊隕涕彥哲傷慕而相嘆曰昔漢表蜀郡魏振江夏府君繼武名跡不亞司命無良天年不假千秋億世芳名難化嗚呼哀哉辭曰恭騫小署聲問羾兮黃朱申命德彌洞兮謨猶謇謇負皇棟兮南陽樹阡式士頌兮乾坤悠永杞億萬兮迪功集卷六
