body:
  text: 迪功集巻五明徐禎卿撰賦頌賛文反反騷賦并序昔揚雄作反騷論者多過之余閔原之含忠隕鬱且復獲謗遂援筆慷慨賦反反騷詞曰稽卬氏之攸肇兮纍楚均之遐瓞侯帝頊之流𦙍兮承靈澤之汪澈夙陳力於皇軌兮歆仁朗之所廬仄仰吾均之潔脩兮羌引軀以伏義播昌烈之赫煜兮雧衆芳之菲菲憤遭世之眊濁兮雜紛揚於江之汜在炎漢之㣲季兮孰臨岷而悼均投束藻之欲麗兮何理屈而誹深冤志而抑道兮冀披誦而有明唯帝監之孔嚴兮敢黨族而誣貞爰均幼志於粹清兮乃中情之獨與謇厲節以植身兮憙浩蕩之脩譽進亹亹於中行兮恐日月之凋邁凖前脩以共蹈兮遑先時而逆敗約性行以赴榘兮經五常以綴佩靈脩謂其允淑兮目成歡而叶妃夫均既沐其昵澤兮又信言之噲噲羌中路而遷好兮寧余心之有介汎光華之的皪兮衆睊睊而妬之何有懼䜛與招慝兮排蛾眉而錯之颺蕙服之芬郁兮遭紛媢而幽毁寧遭幽以迸斥兮敢詭汙而合穢鳳凰翔林而挂網兮龍行陸而困蟻為鳳凰龍豈無知兮亦處身之多虞所貴賢者之韞玉兮不迷邦而遐舉哀宗社之不長兮比干皇皇而不忍去世蔑復以相明兮心耿耿以無從涉湘波以南遡兮昭均心之確忠俗叢蕭而鄣蘭兮實重華之所醜効精白以殞軀兮自先聖之所厚奉靈氛之𤣥筮兮申以巫咸之嘉告覽九州以求匹兮寧閨容之有淑測神占其未然兮豈均曾好此詭疑諗從人以辱義兮不如赴身於淤泥餐秀芬以介齒兮竟河清之難俟違茍生以保譽兮夫何悔於九死泛浮雲之翳翳兮晦沈茫其曷排陽陵㣲而渝度兮晨北風又雨霾精徘徊而不去兮憑拙誠其未爽人情重於捐故兮冀白日之回光懐薜蘺與杜蘅兮時不與其有芳雜緄拉以颺波兮馥烈烈其彌章精氣通於至清兮神髣髴以憑虛駕玉虬與雲驂兮訪太素之舊廬聞至道其可承兮欽均誠之匪懈舍佚㳺以自湛兮夫何以誅其好怪昔貞士之䝉佞兮憤伏斃而靡悔務光沈於淵瀨兮將惡浮埃之霏䨴忠賢忉切以苦身兮葢有隱於墮祚韙三仁之所裁兮見嘆譽於孔父獨耿耿而覯侮兮曾吾均之所尤曰卬愬之惟詖兮駢執正於陽侯放言賦徵堪輿之盈數兮覽四序之消息紛庶形之總總兮孰有生而罔極朝向榮而夕殞兮零雨驟而不日濦濦者易竭兮皦皦易滅何庸愚之長勤兮懷千歲之虞惕植高門與厚利兮為禍怨之胚蘖聖哲高舉以超俗兮憙身脩而名立高明鬼所瞰兮每遭忌而毁集老氏乃貴乎無為兮却嗜慾而枯瘠徒澹泊以自苦兮孰神僊之能執出郭門而遥望兮何丘墳之厯厯嗟聖愚之奚别兮曷仙舉之寥寂信死生之必然兮恨脩短之多忒願放志以自娛兮窮生人之玩溺永逍遥以徜徉兮俟天命之我畢系歌曰對酒歌嗚嗚天道欲如何出門纍纍墳墓多死人白骨相捱摩素裳臨穴重踟蹰望彼友朋泣如頽逝往無還歲迫除超遥乘化㑹斯須懷憂去去汨精離䇿馬遨行聊自娛弔故宫賦陟墟原兮望陁靡倚國門荒衍寥廓宫闕燒殘墉雉㠎嶫垝土蔓延馳道傾沛鞠為陌阡秀麥含榮麻菽芊芊雜草䝉歙叢葛幡幡菲兮散兮鬱鬱連連鳴雉于飛竹樹蓊蕃烏燕黄雀羣飛翾翾疾風揚塵泱曖蔽天四望鬱兮愴可憐也念彼壯夫亦可嘆也蕃華狼籍不可還也失任滅知嗟何怨也百歲之後又誰為冤也𤣥思賦静潜思以濡翰假暇逸以優游馳墳史之秘區獵道德之皇流咨洪纎於淵悉厯上下而旁搜降百氏之藩囿陟鉅匠之崇丘思窮入於無象氣横沛於九州然後合組繪而綜緯攄英藻而外彪總天地之綱維極人事之顯幽昭三五之明烈贊王國之徽猷仰雲門而振步馮英聲而上浮依陽景之末耀軼世路而獨游醜女賦伊何賦形獲此醜疾厲陰乘陽女奪男質眉闊豐吭突頞仰鼻多言舌濁連引齁䶋形如死豕勇憨多力槁髮短禿面目黧黒脂不能赭粉不能白三十不嫁守信閨閾供勞杵臼蚤夜弗息鷄鳴入機没晷下織復有巧慧刺繡縁飾世無梁鴻孰求子匹東家有女窈窕麗色絶世無雙嬌媚輕側越户闚牆靡識刀尺觀者稱豔競欲求得世降道涼好色賤德新臺廢恥谷風見黜周嬖妲己靡吝喪國晉愛驪姬宗子銷骨冶容作厲實猶鬼蜮敢告世人敬監明則濟淮賦惟神淮之巨體兮緯后土而紆流遡遐睇以究源兮指桐栢之靈丘求禹甸之鴻跡兮引襟抱於揚州樹南國之險限兮輔皇畿之壯猷放洪波而東注兮徂日夜之滔滔沛汾汾以騰衍兮凌震怒於陽侯川風馮馮而卒奏兮雲景曖而上浮龜魚翔而汎踊兮鳴重淵之卧虯榜人戒舟以並濟兮奮羣檝而泝游乗中流而極望兮驚長湍之不遒述征賦歲大吕之季律余戒行於上都遡北風之憭慄掩霏雪以遐徂愁長路之不極詠役車於周詩聊騁目以宣憂愴懷玉而興思厯維揚之故域背大江之皇波悲窮野之寥闃憩淮陰之城隅訪王孫之遺蹟謁漂母於空祠哀智傑之有窮亶民生之多罹惟往昔而顧念心揺揺而夕悲逮明發而振檝遂慷慨以遐辭懷歸賦永濡跡於都邑厯壯覽以徘徊仰桂殿之宏麗峙天闕之崔嵬配辰樞以作極扼喉襟之要樞臨飛閣之杳眇倚曲檻而躊躇望靡靡而無畔廓千里而丘夷懷句吳之下邑嗟隔越之可悲心愴愴以増戀䰟營營而外馳豈兹土之匪樂哀故鄉之日違望浮雲之南翔慕征鳥之東蜚嘆余窮之棲旅長淹留以何須大風鬱其夕興振四野之黄埃天慘惻而沈晦失南北之輿陔樹木悽其號唳鳥索羣而鳴哀愁塞耳而頽望掩愁思之彌彌夜展側而不寐步客庭而踟蹰戒膏秣以至旦逝言返乎舊廬申祇賦何先后之靈澤兮蒙覆鞠之資成際皇祇之清吉兮仰階符之鴻明託纎質之昭淑兮竊自懼於登盈每夙夜而震惕兮惟恐忝乎所生念先烈之警敏兮或逢迍而阽瘉嗟卬躬之緜穉兮敢不申戒而栗祗撫手足而敬恤兮慕曽氏之昌矩臨淵冰而戰兢兮乃恭人之攸武遵先民以踐則兮奉徽猷以作程承世烈之緌屬兮敢取尤而怠傾嫉剛勁之召菑兮懿明哲之保身欽禴嘗之在兹兮勉守軀以共禋惡狷夫之執一兮崇尚權之得鈞涉詬患而莫濟兮徒毁己而傷親希練達之完命兮若愚闇之寳名究至道之所届兮何得喪之紛紜道廣博其莫周兮攬要約其可棲天葢高而矇視兮靡脩正而福偕夫命固各有所受兮知者謝福而靡灾先聖經夫大易兮葢將示乎後載奉神筮以推用兮玩㓙占以懲事靖審處以逺辱兮庶不愧乎宗祀喜雨賦奄重雲之斐合沛甘㴻之祁祁逐烈曦之藴虐釋金石之銷糜草木遂其蕃郁禾黍生而依依游魚悦於淵伏飛鳥樂於深枝於是行人休足而解暍農夫負笠而于菑洽王澤於四國詠豐年於周詩皇帝即位頌於赫允烈在明八葉飭堪輿淬日月陛下握元命之符御六龍而爰發旉淵性之神孝稟后祖之閎法朅宣告於皇祇洽七廟而周謁嗣適統以正祚信大厯之攸協歲盛德之次離實蕤賔之紀節日維寅而肇貞辰舍宵而未晣奏鏞鼓以於倫運玉輿而啓闥踐太㣲之法座暢九𤣥之閶闔令德偹矣穆穆皇皇吉儀具戒既勑既匡肅肅法衛烈烈燎揚天軍奉翼雲旌抗張於是百僚儼以趨進盛珮服之鏘鏘咸稽首以共臣荷大禮以肅將登宗伯以錫詔覃濊澤於萬邦滌宿汙而布化俗更始以向方將廣𦙍述之丕志凖熈皞於陶唐煥嘉釐之日貺隆萬壽以無疆猗兮休兮聖道明昌小臣含慶聲流頌章出師頌於鑠維明功躪振古清明諸夏威靖邊土英英我皇天授壯武肇初嗣國思光烈祜六月載暑爰命王膂宣我大猷靖兹小侮交交者旟予幟具舉作愾有容牡轂式序崇原仡仡全野鬱鬱洸洸元旅莫震莫詘聲以先摧畫以決克渠魁牽綏稽首服殛既夷既安四隩來極弓戚言韜永矢文德楊隱君贊并序𢎞治十一年歲格於敦䍧𢎞農楊君恬退樂道棲於支硎之陽東海徐生造謁其廬敦仰高軌乃為贊云辭曰有斐楊君秉文敦古精思塞淵宏通藝理由鄉升朝學優則仕歎詠羔羊儉潔行己幡然改念言慕田里年未及强棄穀自遂遐躅皜皜懸之日月在昔靡聞君擅其烈有巗支硎維石嶫嶫林木嘉懋泉澤有冽刋鑿考楹不假藻纈於焉棲遲甘茹𤣥潔永昭令音奕世稱哲硯贊相國王公得古硯二枚以示客圓中合制則天體也尾足異象效物用也蓄之水土類有俟也收之哲人時而出也沛而行之其澤博矣某不佞輙為之贊云大匠作器體合𤣥穆曳則璋尾峙維鼎足吐膩納清刳脣規腹螺漆載華豐狐受沐乃布綸絲式金式玉君子宜之受天百禄告譴文曰天肆大熯陰陽忒度赫曦蒸炎虐氣糾聚蓬蓬作雲屯恤膏露温風揚埃愁嘆道路田夫灼額扶耒仰愬旱魃不仁云誰之故稽昔推徵亦有時數商德不違桑林身籲宋景一言卒召甘澍况我皇上聖德廣淵民神受祉大惠昭宣歆格后皇承享吉蠲靡有僭忒何辜于天今兹告災束身警惕矜此下民匪稼莫食憂心如湯奉德翼翼虛約自謝損膳清室天降厥咎豈伊我辟實維我人凡此在位敢不靖寅宅心允潔夷秉國鈞好此蹇蹇毋湎胥淪天鑒不逺明威孔神贊我皇祐元釐日新迪功集巻五
