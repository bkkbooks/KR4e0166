body:
  text: 談藝録明徐禎卿撰詩理宏淵談何容易究其妙用可略而言卿雲江水開雅頌之源蒸民麥秀建國風之始覽其事迹興廢如存占彼民情困舒在目則知詩者所以宣玄鬱之思光神妙之化者也先王協之於宫徵被之於簧絃奏之於郊社頌之於宗廟歌之於燕會諷之於房中蓋以之可以格天地感鬼神暢風教通庶情此古詩之大約也漢祚鴻朗文章作新安世楚聲溫純厚雅孝武樂府壯麗宏竒縉紳先生咸從附作雖規迹古風各懷剞􅩻美哉歌詠漢德雍揚可為雅頌之嗣也及夫興懷觸感民各有情賢人逸士呻吟於下里棄妻思婦嘆詠於中閨鼓吹奏乎軍曲童謡發於閭巷亦十五國風之次也東京繼軌大演五言而歌詩之聲微矣至於含氣布詞質而不采七情雜遣並自悠圓或間有微疵終難毁玉兩京詩法譬之伯仲塤篪所以相成其音調也魏氏文學獨専其盛然國運風移古朴易解曹王數子才氣慷慨不詭風人而持立之功卒亦未至故時與之暗化矣嗚呼世代推移理有必爾風斯偃矣何足論才故特標極界以俟君子取焉夫任用無方故情文異尚譬如錢體為圓鈎形為曲箸則尚直屏則成方大匠之家器飾雜出要其格度不過總心機之妙應假刀銛以成功耳至於衆工小技擅巧分門亦自力限有涯不可強也姑陳其目第而為言郊廟之詞莊以嚴戎兵之詞壯以肅朝會之詞大以雍公宴之詞樂而則夫其大義固如斯已深瑕重絫可得而言崇功盛德易夸而乏雅華疏彩會易淫而去質干戈車革易勇而亡警靈節韶光易采而成靡蓋觀於大者神越而心遊中無植幹鮮不眩移此宏詞之極軌也若夫欵欵贈言盡平生之篤好執手送逺慰此戀戀之情朂勵規針婉而不直臨喪挽死痛旨深長雜懷因感以詠言覽古隨方而結論行旅超遙苦辛各異遨逰晤賞哀樂難常孤孽怨思達人齊物忠臣幽憤貧士鬱伊此詩家之錯變而規格之縱橫也然思或朽腐而未精情或零落而未備詞或罅缺而未博氣或柔獷而未調格或莠亂而未叶咸為病焉故知驅縱靡常城門一軌揮斤堊鼻能者得之若乃訪之於逺不下帶袵索之以近則在千里此詩之所以未易言也情者心之精也情無定位觸感而興既動于中必形於聲故喜則為笑啞憂則為吁歔怒則為叱吒然引而成音氣實為佐引音成詞文實與功蓋因情以發氣因氣以成聲因聲而繪詞因詞而定韻此詩之源也然情實眑渺必因思以窮其奧氣有粗弱必因力以奪其偏詞難妥帖必因才以致其極才易飄揚必因質以禦其侈此詩之流也繇是而觀則知詩者乃精神之浮英造化之祕思也若夫妙騁心機隨方合節或約旨以植義或宏文以敘心或緩發如朱絃或急張如躍楛或始迅以中留或既優而後促或慷慨以任壯或悲悽以引泣或因拙以得工或發竒而似易此輪匠之超悟不可得而詳也易曰書不盡言言不盡意若乃因言求意其亦庶乎有得與魏詩門户也漢詩堂奧也入户升堂固其機也而晉氏之風本之魏焉然而判迹於魏者何也故知門户非定程也陸生之論文曰非知之難行之難也夫既知行之難又安得云知之非難哉又曰詩緣情而綺靡則陸生之所知固魏詩之查穢耳嗟夫文勝質衰本同末異此聖哲所以感歎翟朱所以興哀者也夫欲拯質必務削文欲反本必資去末是固曰然然非通論也玊韞於石豈曰無文淵珠露采亦匪無質由質開文古詩所以擅巧由文求質晉格所以為衰若乃文質雜興本末並用此魏之失也故繩漢之武其流也猶至於魏宗晉之體其敝也不可以悉矣夫情能動物故詩足以感人荆軻變徵壯士瞋目延年婉歌漢武慕嘆凡厥含生情本一貫所以同憂相瘁同樂相傾者也故詩者風也風之所至草必偃焉聖人定經列國為風固有以也若乃歔欷無涕行路必不為之興哀訴難不膚聞者必不為之變色故夫直戅之詞譬之無音之絃耳何所取聞於人哉至於陳采以眩目裁虛以蕩心抑又末矣詩家名號區别種種原其大義固自同歸歌聲雜而無方行體疏而不滯吟以呻其鬱曲以導其微引以抽其臆詩以言其情故名因昭象合是而觀則情之體備矣夫情既異其形故辭當因其勢譬如寫物繪色倩盼各以其狀隨規逐矩圓方巧獲其則此乃因情立格持守圍環之大略也若夫神工哲匠顛倒經樞思若連絲應之杼軸文如鑄冶逐手而遷從衡參互恆度自若此心之伏機不可強能也朦朧萌拆情之來也汪洋漫衍情之沛也連翩絡屬情之一也馳軼步驟氣之達也簡練揣摩思之約也頡頏纍貫韻之齊也混純貞粹質之檢也明雋清圓詞之藻也高才間擬濡筆求工發旨立意雖旁出多門未有不由斯户者也至於垓下之歌出自流離煮豆之詩成於草卒命辭慷慨並自竒工此則深情素氣激而成言詩之權例也傳曰疾行無善迹乃藝家之恆論也昔桓談學賦於揚雄雄令讀千首賦蓋所以廣其資亦得以參其變也詩賦粗精譬之絺綌而不深探研之力宏識誦之功何能益也故古詩三百可以博其源遺篇十九可以約其趣樂府雄高可以厲其氣離騷深永可以禆其思然後法經而植旨繩古以崇辭雖或未盡臻其奧吾亦罕見其失也嗚呼雕繢滿目並已稱工芙蓉始發尤能擅麗後世之惑宜益滋焉夫未覩鈞天之美則北里為工不詠關雎之亂則桑中為雋故匪師涓難為語也夫詞士輕偷詩人忠厚下訪漢魏古意猶存也蘇子之戒愛景光少卿之厲崇明德規善之辭也魏武之悲東山王粲之感鳴鸛子恤之辭也甄后致頌於延年劉妻取譬於唾井繾綣之辭也子建言恩何必衾枕文君怨嫁願得白頭勸諷之辭也究其微旨何殊經術作者蹈古轍之嘉粹刋佻靡之非經豈直精詩亦可以養德也鹿鳴頍辨之宴好黍離有蓷之哀傷氓蚩晨風之悔嘆蟋蟀山樞之感慨柏舟終風之憤悶杕杜葛藟之憫恤葛屨祈父之譏訕黃鳥二子之痛悼小辨何人斯之怨誹小宛雞鳴之戒惕大東何草不黃之困疵巷伯鶉奔之惡惡綢繆車牽之歡慶木瓜采葛之情念雄雉伯兮之思懷北山陟岵之行役伐檀七月之勤敏常棣蓼莪之大義皆曲盡情思婉孌氣詞哲匠縱橫畢由斯閾也詩之辭氣雖由政教然支分條布略有徑庭良由人士品殊藝隨遷易故宗工巨匠辭淳氣平豪賢碩俠辭雄氣武遷臣孽子辭厲氣促逸民遺老辭玄氣沈賢良文學辭雅氣俊輔臣弼士辭尊氣嚴閹僮壼女辭弱氣柔媚夫幸士辭靡氣蕩荒才嬌麗辭淫氣傷七言沿起咸曰柏梁然寧戚扣牛已肇南山之篇矣其為則也聲長字縱易以成文故藴氣雕辭與五言略異要而論之滄浪擅其竒柏梁𢎞其質四愁墜其雋燕歌開其靡他或雜見於樂篇或援格於賦系妍醜之間可以類推矣詩貴先合度而後工拙縱橫格軌各具風雅繁欽定情本之鄭衛生年不滿百出自唐風王粲從軍得之二雅張衡同聲亦合關雎諸詩固自有工醜然而並驅者託之軌度也夫哲匠鴻才固繇內穎中人承學必自迹求大抵詩之妙軌情若重淵奧不可測辭如繁露貫而不雜氣如良駟馳而不軼由是而求可以冥會矣樂府往往敘事故與詩殊蓋敘事辭緩則冗不精翩翩堂前燕疊字極促乃佳阮瑀駕出北郭門視孤兒行大緩弱不逮矣詩不能受瑕工拙之間相去無幾頓自絶殊如塘上行云莫以豪賢故棄捐素所愛莫以魚肉賤棄捐蔥與薤莫以麻枲賤棄捐菅與蒯浮萍篇則曰茱萸自有芳不若桂與蘭新人雖可愛無若故所歡本自倫語然佳不如塘上行古詩句格自質然大入工唐風山有樞云何不日鼓瑟鐃歌辭曰臨高臺以軒可以當之又江有香草目以蘭黃鵠高飛離哉翻絶工美可為七言宗也氣本尚壯亦忌鋭逸魏祖云老驥伏櫪志在千里烈士暮年壯心不已猶曖曖也思王野田黃雀行譬如錐出囊中大索露矣樂府中有妃呼豨伊何那諸語本自亡義但補樂中之音亦有疊本語如曰賤妾與君共餔糜共餔糜之類也生年不滿百四語西門行亦掇之古人不諱重襲若相援耳覽西門終篇固咸自鑠古詩然首尾語精美可二也溫裕純雅古詩得之遒深徑絶不若漢鐃歌樂府詞樂府烏生八九子東門行等篇如淮南小山之賦氣韻絶峻下可與孟德道之王劉文學曹當內手耳韋仲班傳輩四言詩僒縛不蕩曺公短歌行子建來日大難工堪為則矣白狼槃木詩三章亦佳緣不受雅頌困耳漢魏之交文人特茂然衰世叔運終鮮粹才孔融懿名高列諸子視臨終詩大類銘針語耳應瑒巧思逶迤失之靡靡休璉百一微能自振然傷媚焉仲宣流客慷慨有懷西京之餘鮮可誦者陳琳意氣鏗鏗非風人度也阮生優緩有餘劉楨錐角重峭割曳綴懸並可稱也曹丕資近美媛逺不逮植然植之才不堪整栗亦有憾焉若夫重熙鴻化蒸育叢材金玊其相綽哉有斐求之斯病殆寡已夫古詩降魏辭人所遺雖蕭統簡輯過冗而不精劉協緒論亦略而未備况夫人懷敝帚自過千金法言懿則遂見委廢至於篇句零落雖深猶幸有存者可足徵也故著此篇以標凖的粗方大義誠不越兹後之君子庶可以考已客論曰傳云王者之迹熄而詩亡蓋傷之也降自桓靈廢而禮樂崩晉宋王而新聲作古風沈滯蓋已甚焉述者上緣聖則下擲儒玄廣教化之源崇文雅之致削浮華之風敦古朴之習誠可尚已恐學士狎耳目之玩譏瑣尾之文故序而系之俾知所究談藝録
